services:
  mcp-multi:
    image: ghcr.io/tekgnosis-net/multi-mcp:${IMAGE_TAG:-latest}
    container_name: mcp-multi
    restart: unless-stopped
    volumes:
      - ./config:/config
      - ./apps:/extra_apps
    ports:
      - "8096:8096"
    environment:
      MCP_PORT: 8096
      MCP_HOST: 0.0.0.0
      LOG_LEVEL: INFO
      TRANSPORT_TYPE: http
      CONFIG_FILE: /config/mcp.json
